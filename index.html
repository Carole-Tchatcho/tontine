<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBORA · Registre de tontine — prototype v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4ECDB; --card:#FCF8EF; --card2:#FFFDF8;
    --ink:#2A2018; --mid:#6E6457; --faint:#A79E8C;
    --line:rgba(140,95,40,.22); --line-strong:rgba(140,95,40,.42);
    --obsidian:#2A2017; --obsidian2:#3A2C1E;
    --gold:#9A7230; --gold-bright:#C9A84C; --gold-l:#F5E6C0;
    /* indigo Ndop — uniquement le versant ascension/sacré. Le jour reste or. */
    --indigo:#23306E; --indigo-deep:#161B3D; --indigo-night:#0E1326;
    --ndop-line:rgba(201,168,76,.55);
    --green:#1E6B42; --green-bg:#E4EFE7;
    --pending:#8A6D3B; --pending-bg:#F6EBD2;
    --core:#7A5A2E; --core-bg:#F2E7CB;
    --r:14px; --r-sm:9px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',system-ui,sans-serif;background:radial-gradient(125% 85% at 72% -5%,#F8F1E3,#F1E5D1 60%,#EBDCC4);background-attachment:fixed;color:var(--ink);line-height:1.55;
    -webkit-font-smoothing:antialiased;padding-bottom:60px}
  h1,h2,h3,.serif{font-family:'Cormorant Garamond',Georgia,serif}
  .mid{color:var(--mid)} .faint{color:var(--faint)}
  .wrap{max-width:960px;margin:0 auto;padding:0 24px}

  header{background:linear-gradient(180deg,#ECDBBC,#E4CBAE);color:#5E4428;position:sticky;top:0;z-index:20;
    border-bottom:1px solid rgba(140,95,40,.35);box-shadow:0 1px 0 rgba(140,95,40,.12)}
  .hbar{max-width:960px;margin:0 auto;padding:16px 26px;display:flex;align-items:center;gap:20px}
  .brand{display:flex;flex-direction:column;line-height:1.1}
  .brand .b1{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;letter-spacing:.02em;color:#3A2A16}
  .brand-tri{flex:0 0 auto}
  .tri-w{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;fill:#5E3F18}
  .brand .b2{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:#5E3F18;font-weight:700}
  .hnav{margin-left:auto;display:flex;gap:8px}  .hnav button{position:relative;font-family:inherit;font-size:13px;color:#5E4428;background:transparent;border:1px solid transparent;
    padding:8px 14px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.18s}
  .hnav button:hover{border-color:rgba(140,95,40,.45)}
  .hnav button.on{background:rgba(140,95,40,.15);border-color:rgba(140,95,40,.45)}
  .dot{display:inline-block;min-width:17px;height:17px;line-height:17px;text-align:center;font-size:10px;font-weight:600;
    background:#9A6A33;color:#F5E6C0;border-radius:9px;padding:0 4px}
  .langsw{display:inline-flex;gap:0;border:1px solid rgba(140,95,40,.4);border-radius:8px;overflow:hidden;flex:0 0 auto}
  .langsw button{font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.04em;padding:6px 10px;border:none;background:transparent;color:#7a5a2e;cursor:pointer}
  .langsw button.on{background:#9A6A33;color:#F5E6C0}

  main{padding-top:30px}
  .eyebrow{font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:8px}
  .page-title{font-size:34px;font-weight:500;line-height:1.08;letter-spacing:-.01em;margin-bottom:2px}
  .lead{color:var(--mid);font-size:15.5px;margin-top:8px;max-width:60ch}
  .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .between{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .stack{display:flex;flex-direction:column;min-width:0}

  .btn{font-family:inherit;font-size:14.5px;font-weight:500;border-radius:10px;padding:11px 18px;cursor:pointer;
    border:1px solid transparent;transition:.18s;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
  .btn-gold{background:var(--obsidian);color:var(--gold-l);border-color:var(--obsidian)}
  .btn-gold:hover{background:#1A130A}
  .btn-ghost{background:transparent;color:var(--gold);border-color:var(--line-strong)}
  .btn-ghost:hover{background:rgba(154,114,48,.07)}
  .btn-green{background:var(--green);color:#fff;border-color:var(--green)}
  .btn-sm{padding:7px 13px;font-size:13px;border-radius:8px}

  .cards{display:grid;gap:18px;margin-top:26px;grid-template-columns:repeat(auto-fill,minmax(min(330px,100%),1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;
    transition:.2s;box-shadow:0 1px 0 rgba(154,114,48,.05)}
  .card.click{cursor:pointer}
  .card.click:hover{transform:translateY(-2px);border-color:var(--line-strong);box-shadow:0 10px 26px -16px rgba(30,33,40,.45)}
  .t-name{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:600;line-height:1.1}
  .t-meta{font-size:13.5px;color:var(--mid);margin-top:3px}
  .kvs{display:flex;flex-wrap:wrap;gap:18px;margin-top:16px}
  .kv .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .kv .v{font-size:16px;font-weight:500;margin-top:1px}

  .pill{font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:20px;letter-spacing:.02em;white-space:nowrap;display:inline-block}
  .p-now{background:var(--gold-l);color:#6e5217;border:1px solid rgba(154,114,48,.3)}
  .p-paid{background:var(--green-bg);color:var(--green)}
  .p-decl{background:var(--pending-bg);color:var(--pending)}
  .p-due{background:#F0E8DA;color:#8A7B5F;border:1px solid var(--line-strong)}
  .p-done{background:#ECE2CF;color:#6f6c61}
  .p-soon{background:var(--core-bg);color:var(--core)}

  .role{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);
    border:1px solid var(--line-strong);padding:1px 6px;border-radius:5px;margin-left:7px;vertical-align:middle}

  .seg{display:inline-flex;background:#ECE1CB;border-radius:10px;padding:3px;gap:3px;flex-wrap:wrap}
  .seg button{font-family:inherit;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--mid);
    padding:7px 15px;border-radius:7px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--card2);color:var(--ink);box-shadow:0 1px 4px rgba(30,33,40,.12)}

  .asnote{font-size:12.5px;color:var(--mid);background:transparent;border:none;border-left:2px solid var(--gold);
    border-radius:0;padding:3px 0 3px 14px;margin-top:18px;line-height:1.55}
  .asnote b{font-weight:600;color:var(--ink)}

  .panel{background:var(--card2);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-top:20px;box-shadow:0 1px 3px rgba(120,90,40,.04)}
  .panel-h{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;overflow:hidden}
  .panel-h::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:.5;background-repeat:repeat;background-position:center;background-size:26px 18px;-webkit-mask-image:linear-gradient(90deg,transparent 0,transparent 34%,#000 100%);mask-image:linear-gradient(90deg,transparent 0,transparent 34%,#000 100%);background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='26' height='18' viewBox='0 0 26 18'><g fill='none' stroke='rgb(154,114,48)' stroke-opacity='.5' stroke-width='1'><path d='M1 14 L7 5 L13 14 L19 5 L25 14'/><circle cx='7' cy='14' r='1' fill='rgb(154,114,48)' stroke='none'/><circle cx='19' cy='14' r='1' fill='rgb(154,114,48)' stroke='none'/></g></svg>")}
  .panel-h h3{font-size:21px;font-weight:600}
  .mrow{display:flex;align-items:center;gap:13px;padding:13px 20px;border-bottom:1px solid rgba(154,114,48,.12)}
  .mrow:last-child{border-bottom:none}
  .av{flex:0 0 auto;width:36px;height:36px;border-radius:50%;background:hsl(var(--ah,42) 40% 89%);color:hsl(var(--ah,42) 42% 31%);
    display:grid;place-items:center;font-weight:600;font-size:14px;font-family:'Cormorant Garamond',serif}
  .av.recv{background:var(--obsidian);color:var(--gold-bright)}
  .av.slot{background:transparent;border:1px dashed var(--line-strong);color:var(--faint)}
  .mname{font-weight:500;font-size:15px}
  .msub{font-size:12.5px;color:var(--faint)}
  .mrow .right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .slotrow{opacity:.85}

  .field{margin-top:16px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
  .field .hint{font-size:12.5px;color:var(--faint);font-weight:400;margin-bottom:7px}
  input[type=text],input[type=number],select{width:100%;font-family:inherit;font-size:15px;color:var(--ink);
    background:var(--card2);border:1px solid var(--line-strong);border-radius:10px;padding:11px 13px;outline:none;transition:.15s}
  input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.15)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .name-field input{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;padding:13px 15px}

  .consent{display:flex;gap:11px;align-items:flex-start;padding:14px;border:1px solid var(--line);border-radius:11px;margin-top:12px;background:var(--card)}
  .consent input{margin-top:3px;width:17px;height:17px;accent-color:var(--gold);flex:0 0 auto}
  .consent .ct{font-size:13.5px;font-weight:500}
  .consent .cd{font-size:12.5px;color:var(--mid);margin-top:2px}
  .tag{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:5px;margin-left:7px;vertical-align:middle}
  .tag-tx{background:var(--core-bg);color:var(--core)}
  .tag-mk{background:var(--pending-bg);color:var(--pending)}

  .linkbox{display:flex;gap:10px;margin-top:10px}
  .linkbox input{font-family:ui-monospace,monospace;font-size:13px;color:var(--core)}
  .code{font-family:ui-monospace,monospace;font-weight:600;color:var(--core);background:var(--core-bg);padding:2px 8px;border-radius:6px}

  .notif{display:flex;gap:13px;padding:15px 20px;border-bottom:1px solid rgba(154,114,48,.12)}
  .notif:last-child{border:none}
  .nic{flex:0 0 auto;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:16px;font-weight:600}
  .nic.g{background:var(--gold-l);color:var(--gold)} .nic.v{background:var(--green-bg);color:var(--green)}
  .nic.b{background:var(--core-bg);color:var(--core)}
  .ntext .nt{font-size:14px;font-weight:500} .ntext .nd{font-size:12.5px;color:var(--faint);margin-top:1px}

  .progress{height:7px;background:#E9DEC4;border-radius:6px;overflow:hidden;margin-top:9px}
  .progress > i{display:block;height:100%;background:var(--gold);border-radius:6px;transition:width .4s}

  /* liseré Ndop : un fil d'or sur trame indigo, réservé aux seuils */
  .ndop-edge{position:relative}
  .ndop-edge::before{content:'';position:absolute;left:0;right:0;top:0;height:3px;
    background:repeating-linear-gradient(90deg,var(--indigo) 0 7px,var(--ndop-line) 7px 9px);opacity:.9}

  .bridge{position:relative;margin-top:18px;background:linear-gradient(180deg,var(--indigo-deep),var(--indigo-night));color:var(--gold-l);
    border:1px solid rgba(201,168,76,.4);border-radius:var(--r);padding:20px 22px;overflow:hidden}
  .bridge .bt{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#fff}
  .bridge .bd{font-size:13.5px;color:#CBC6E0;margin-top:5px;max-width:52ch}

  .backlink{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--gold);cursor:pointer;
    background:none;border:none;font-family:inherit;margin-bottom:14px}
  .backlink:hover{text-decoration:underline}
  .footer{position:relative;margin-top:46px;padding-top:26px;border-top:none;font-size:11.5px;color:var(--faint);text-align:center;line-height:1.7}
  .footer::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:min(320px,78%);height:14px;pointer-events:none;opacity:.55;background-repeat:repeat-x;background-position:center;background-size:20px 14px;-webkit-mask-image:linear-gradient(90deg,transparent,#000 28%,#000 72%,transparent);mask-image:linear-gradient(90deg,transparent,#000 28%,#000 72%,transparent);background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='14' viewBox='0 0 20 14'><path d='M10 2 L18 7 L10 12 L2 7 Z' fill='none' stroke='rgb(154,114,48)' stroke-opacity='.6' stroke-width='1'/></svg>")}
  .footer .flink{color:var(--gold);cursor:pointer;text-decoration:underline;text-underline-offset:2px}
  .empty{text-align:center;padding:46px 20px;color:var(--mid)}
  .reassure{display:block;line-height:1.55;font-size:12.5px;color:var(--green);
    background:var(--green-bg);border-radius:20px;padding:5px 13px;margin-top:14px}

  .level-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;font-size:12.5px;font-weight:600;letter-spacing:.02em}
  .level-track{display:flex;gap:7px;margin-bottom:4px}
  .level-node{flex:1;min-width:0}
  .level-bar{height:6px;border-radius:5px}
  .level-name{font-size:10px;margin-top:7px;color:var(--faint);text-align:center;line-height:1.2}
  .level-node.cur .level-name{color:var(--ink);font-weight:700}
  .level-lock{opacity:.6}
  .crit{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;margin-top:9px}
  .crit .ck{flex:0 0 auto;width:19px;height:19px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;margin-top:1px}
  .crit .ck.ok{background:var(--green-bg);color:var(--green)} .crit .ck.no{background:#ECE2CF;color:#9a968c}
  .crit.unmet{color:var(--mid)}
  .unlock{font-size:13.5px;color:var(--mid);margin-top:14px} .unlock b{color:var(--ink)}

  .cercle{position:relative;margin-top:14px;background-color:#060814;background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='112' height='112' viewBox='0 0 112 112'><g fill='none' stroke='rgb(201,168,76)' stroke-opacity='.4' stroke-width='1'><circle cx='30' cy='32' r='15'/><path d='M30 17 V47 M15 32 H45 M19 21 L41 43 M41 21 L19 43'/><path d='M82 18 Q92 34 82 50 Q72 34 82 18 Z'/><path d='M82 26 V42'/><path d='M6 80 l9 9 l9 -9 M28 80 l9 9 l9 -9 M50 80 l9 9 l9 -9 M72 80 l9 9 l9 -9 M94 80 l9 9 l9 -9'/><circle cx='30' cy='32' r='2' fill='rgb(201,168,76)' fill-opacity='.4' stroke='none'/></g></svg>");background-size:112px 112px;background-repeat:repeat;border:1px solid rgba(201,168,76,.45);border-radius:18px;padding:30px 24px;overflow:hidden;color:#CFCBE0}
  .cercle::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.06;
    background-image:repeating-linear-gradient(45deg,var(--gold-l) 0 1px,transparent 1px 11px),repeating-linear-gradient(-45deg,var(--gold-l) 0 1px,transparent 1px 11px)}
  .cercle > *{position:relative;z-index:1}
  .c-glow{position:absolute;top:-70px;left:50%;transform:translateX(-50%);width:340px;height:230px;background:radial-gradient(closest-side,rgba(120,130,220,.22),transparent);pointer-events:none}
  .cercle>.cercle-sheen{position:absolute;inset:0;z-index:0;pointer-events:none;mix-blend-mode:screen;
    background:linear-gradient(115deg,transparent 38%,rgba(245,230,192,.05) 47%,rgba(245,230,192,.13) 50%,rgba(245,230,192,.05) 53%,transparent 62%);
    background-size:260% 100%;background-repeat:no-repeat;background-position:150% 0;animation:cercleSheen 16s linear infinite}
  @keyframes cercleSheen{0%{background-position:150% 0}55%{background-position:-50% 0}100%{background-position:-50% 0}}
  @media (prefers-reduced-motion:reduce){.cercle>.cercle-sheen{animation:none;background:none}}
  .c-eyebrow{position:relative;font-size:10.5px;letter-spacing:.2em;color:#A9A4D6;font-weight:600}
  .c-title{position:relative;font-family:'Cormorant Garamond',serif;font-size:46px;font-weight:600;line-height:1;margin-top:6px;background:linear-gradient(120deg,#F5E6C0,#C9A84C 45%,#9A7230);-webkit-background-clip:text;background-clip:text;color:transparent}
  .c-sub{position:relative;font-size:14px;color:#CFCBE0;margin-top:10px;max-width:48ch;line-height:1.5}
  .c-card{position:relative;background:rgba(22,27,61,.72);border:1px solid rgba(201,168,76,.4);border-radius:13px;padding:16px 18px;margin-top:16px}
  .c-card h3{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:#F5E6C0}
  .c-card p{font-size:13.5px;color:#BDB9DA;margin-top:6px;line-height:1.55} .c-card p b{color:#F5E6C0}
  .c-note{position:relative;margin-top:18px;font-size:12px;color:#A9A4D6;font-style:italic}
  .c-discover{margin-top:16px;width:100%;justify-content:center;background:var(--indigo-deep);color:#F5E6C0;border:1px solid rgba(201,168,76,.5)}
  .c-discover:hover{background:#1E2450}

  .pyr{display:flex;flex-direction:column;align-items:center;gap:9px;margin:22px 0 6px}
  .tier{position:relative;height:56px;border-radius:11px;display:flex;align-items:center;justify-content:center;gap:8px;
    font-family:'Cormorant Garamond',serif;font-weight:600;font-size:19px;transition:.18s;cursor:pointer;
    box-shadow:0 6px 18px -12px rgba(42,32,23,.5)}
  .tier.locked{cursor:pointer}
  .tier.future{opacity:.42}
  .tier .here{position:absolute;right:10px;font-family:'DM Sans',sans-serif;font-size:9.5px;font-weight:700;letter-spacing:.04em;
    background:rgba(255,255,255,.92);color:#2A2018;padding:3px 8px;border-radius:20px}
  .tier .lk{position:absolute;right:12px;font-size:14px}
  .pyr-cap{text-align:center;font-size:12px;color:var(--mid);margin-bottom:4px}
  .lvlcard{background:var(--card2);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-top:18px}
  .lvlcard h3{font-size:21px;font-weight:600}

  .cel-overlay{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:24px;
    background:rgba(20,16,10,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:celFade .25s ease}
  .cel-overlay.out{animation:celFadeOut .24s ease forwards}
  .cel-card{position:relative;overflow:hidden;background:linear-gradient(180deg,#FFFDF8,#FBF3E4);
    border:1px solid rgba(201,168,76,.5);border-radius:20px;padding:30px 26px;max-width:360px;width:100%;text-align:center;
    box-shadow:0 30px 80px -30px rgba(42,32,23,.7);animation:celPop .42s cubic-bezier(.2,.8,.2,1)}
  .cel-card::before{content:'';position:absolute;top:0;left:-60%;width:55%;height:100%;pointer-events:none;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.65),transparent);transform:skewX(-18deg);animation:celSheen 1.15s ease .25s 1}
  .cel-spark{font-size:22px;color:#C9A84C}
  .cel-eyebrow{font-size:10.5px;letter-spacing:.2em;font-weight:700;color:#9A6A33;margin-top:6px}
  .cel-badge{display:inline-block;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:18px;padding:7px 18px;border-radius:22px;margin-top:14px;animation:celBadge .5s ease .15s both}
  .cel-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;margin-top:14px;color:#2A2018;line-height:1.1}
  .cel-text{font-size:13.5px;color:#6E6457;margin-top:6px}
  .cel-bridge{background:#FBF3E0;border:1px dashed rgba(140,95,40,.4);border-radius:13px;padding:14px;margin:18px 0 14px;text-align:left}
  .cb-t{font-weight:600;font-size:13.5px;color:#2A2018} .cb-d{font-size:12.5px;color:#6E6457;margin-top:4px;line-height:1.5}
  @keyframes celFade{from{opacity:0}to{opacity:1}}
  @keyframes cardIn{from{opacity:0;transform:translateY(11px)}to{opacity:1;transform:none}}
  .cards .card{animation:cardIn .44s cubic-bezier(.2,.7,.3,1) both}
  .cards .card:nth-child(2){animation-delay:.06s}
  .cards .card:nth-child(3){animation-delay:.12s}
  .cards .card:nth-child(4){animation-delay:.18s}
  .cards .card:nth-child(n+5){animation-delay:.24s}

  /* ===== 1 · Anneau de rotation (signature) ===== */
  .ring{display:block;width:236px;max-width:80%;height:auto;margin:8px auto 2px}
  .ring-arc{transition:stroke-dasharray .55s ease}
  .rnode circle{stroke-width:1.6;transition:.2s}
  .rnode text{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600}
  .rn-done circle{fill:var(--gold-l);stroke:var(--gold)} .rn-done text{fill:var(--gold)}
  .rn-now circle{fill:var(--obsidian);stroke:var(--gold-bright)} .rn-now text{fill:var(--gold-bright)}
  .rn-soon circle{fill:var(--card);stroke:var(--line-strong)} .rn-soon text{fill:var(--mid)}
  .rn-slot circle{fill:transparent;stroke:var(--line-strong);stroke-dasharray:3 3} .rn-slot text{fill:var(--faint)}
  .rn-halo{fill:none;stroke:var(--gold-bright);stroke-width:2;animation:ringPulse 2.6s ease-in-out infinite}
  @keyframes ringPulse{0%,100%{opacity:.55;r:22}50%{opacity:.12;r:27}}

  .ring-legend span{display:inline-flex;align-items:center;gap:6px}

  .lg-soon{background:var(--card);border:1px solid var(--line-strong)}

  /* ===== 2 · Sceau de confiance (marque récurrente) ===== */

    border:1px solid var(--line-strong);background:var(--card);border-radius:30px;padding:5px 13px 5px 9px;margin-top:13px}

  /* ===== 3 · Avatars identitaires ===== */

  /* ===== 4 · Mouvement du quotidien ===== */
  .fresh{animation:viewIn .3s ease}
  @keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes okPop{0%{transform:scale(.62);opacity:.2}60%{transform:scale(1.13)}100%{transform:scale(1);opacity:1}}
  .flash-ok{animation:okPop .42s ease}
  @keyframes rowGlow{0%{background:var(--green-bg)}100%{background:transparent}}
  .flash-row{animation:rowGlow 1.1s ease}
  .pill{transition:.18s}
  .btn{transition:transform .12s ease, background .18s ease, box-shadow .2s ease}
  .btn:active{transform:scale(.97)}
  .mrow{transition:background .15s ease}
  .mrow:hover{background:rgba(154,114,48,.045)}
  .seg button{transition:.18s}
  /* entrée animée de l'anneau — seulement au changement d'écran (.fresh) */
  @keyframes nodeIn{from{opacity:0}to{opacity:1}}
  @keyframes arcDraw{from{stroke-dashoffset:var(--arc-len,0)}to{stroke-dashoffset:0}}
  @keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
  .fresh .rnode{animation:nodeIn .5s ease backwards}
  .fresh .ring-arc{animation:arcDraw .95s ease .08s backwards}
  .fresh .rn-now circle{animation:popIn .5s ease backwards;transform-box:fill-box;transform-origin:center}
  /* lumière continue qui circule d'un membre à l'autre (la rotation, vivante) */
  .ring-orbit{transform-box:view-box;transform-origin:130px 130px;animation:ringOrbit 9s linear infinite}
  @keyframes ringOrbit{from{transform:rotate(0)}to{transform:rotate(360deg)}}

function ledgerFingerprint(c,a,list){

  let h=2166136261; for(let i=0;i<seed.length;i++){h^=seed.charCodeAt(i);h=Math.imul(h,16777619);}

function buildRounds(places,startMonth,current,currentContribs){
  const rounds=[];

    let status=i<current?'done':(i===current?'now':'soon');

    if(i<current){contribs=new Array(places).fill('confirmed');}
    else if(i===current){contribs=currentContribs.slice();}

}

function memberStats(t,idx){
  const done=t.rounds.filter(rd=>rd.status==='done');
  const cyclesDone=done.filter(rd=>rd.contribs[idx]==='confirmed').length;
  const lateKept=done.filter(rd=>rd.contribs[idx]==='confirmed' && rd.lateMarks && rd.lateMarks[idx]).length;
  const onTime=done.length?Math.round(Math.max(0,cyclesDone-lateKept)/done.length*100):100;
  const nm=t.members[idx]?t.members[idx].name:null;
  const isOrg=!!(t.members[idx]&&t.members[idx].role==='organisateur');
  const tontines=nm?state_tontines.filter(x=>x.members.some(m=>m&&m.name===nm)).length:1;
  return {cyclesDone,onTime,lateKept,isOrg,tontines};
}
function computeLevel(s){
  if(s.cyclesDone>=3 && s.onTime>=95 && s.tontines>=2) return 3;
  if(s.cyclesDone>=1 && s.onTime>=90 && (s.isOrg||s.tontines>=2)) return 2;
  if(s.cyclesDone>=1 && s.onTime>=80) return 1;
  return 0;
}
function userLevel(name){
  if(name && name===state.user && state.demoLevel!=null) return state.demoLevel;
  return name ? computeLevel(aggregateStats(name)) : 0;
}

function genLabels(places,frequency){const out=[],base=new Date();
  for(let i=0;i<places;i++){const d=new Date(base);
    if(frequency==='mensuelle')d.setMonth(d.getMonth()+i);
    else if(frequency==='quinzaine')d.setDate(d.getDate()+i*15); else d.setDate(d.getDate()+i*7);
    out.push(frequency==='mensuelle'?`${MONTHS[d.getMonth()]} ${d.getFullYear()}`:d.toLocaleDateString('fr-CH'));}
  return out;}
function assembleSB(t,memberships,rounds,contribs,uid){
  const members=new Array(t.places).fill(null), slotOf={};
  for(const m of memberships){const p=m.profiles||{};
    members[m.slot]={name:p.nom||'—',contact:p.contact||'—',role:m.role,mk:m.consent_marketing,_membershipId:m.id,_userId:m.user_id};
    slotOf[m.id]=m.slot;}
  const sorted=[...rounds].sort((a,b)=>a.idx-b.idx);
  const uiR=sorted.map(r=>{const c=new Array(t.places).fill('none');
    contribs.filter(x=>x.round_id===r.id).forEach(x=>{const s=slotOf[x.membership_id];if(s!=null)c[s]=x.statut;});
    return{id:r.id,beneficiary:r.beneficiaire_slot,label:r.label,status:ST_DB2UI[r.statut]||'soon',received:r.cagnotte_recue,contribs:c};});
  return{id:t.id,code:t.code,name:t.nom,amount:Number(t.montant),currency:t.devise,frequency:t.frequence,places:t.places,
    currentRound:Math.max(0,uiR.findIndex(r=>r.status==='now')),me:Math.max(0,members.findIndex(m=>m&&m._userId===uid)),
    members,rounds:uiR};
}

/* ---------- signature : anneau de rotation ---------- */
function rotationRing(t){
  const N=t.places, cx=130, cy=130, R=92, cur=t.currentRound;
  const nodes=t.rounds.map((rd,i)=>{
    const ang=(-90 + i*360/N)*Math.PI/180, x=cx+R*Math.cos(ang), y=cy+R*Math.sin(ang);
    const hasM=!!t.members[rd.beneficiary];
    let cls = !hasM?'rn-slot' : rd.status==='done'?'rn-done' : rd.status==='now'?'rn-now' : 'rn-soon';
    const halo = rd.status==='now' ? `<circle cx="${x}" cy="${y}" r="22" class="rn-halo"/>` : '';
    return `${halo}<g class="rnode ${cls}" style="animation-delay:${60+i*55}ms"><circle cx="${x}" cy="${y}" r="17"/>
      <text x="${x}" y="${y}" dy="0.34em" text-anchor="middle">${hasM?initials(benName(t,rd.beneficiary)):'·'}</text></g>`;
  }).join('');
  const C=2*Math.PI*R, frac=N?cur/N:0, arcLen=frac*C, r=t.rounds[cur];
  const conf=r.contribs.filter((s,idx)=>s==='confirmed'&&t.members[idx]).length;
  const collected=conf*t.amount, full=t.places*t.amount;
  return `<svg class="ring" viewBox="0 0 260 260" role="img" aria-label="Rotation de la tontine — tour ${cur+1} sur ${N}">
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--line)" stroke-width="2"/>
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--gold)" stroke-width="3" stroke-linecap="round"
      class="ring-arc" style="--arc-len:${arcLen.toFixed(1)}" stroke-dasharray="${arcLen.toFixed(1)} ${C.toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>
    <defs><radialGradient id="orbitGlow-${t.id}"><stop offset="0" stop-color="#F2D88E" stop-opacity=".85"/><stop offset="55%" stop-color="#C9A84C" stop-opacity=".3"/><stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/></radialGradient></defs>
    <g class="ring-orbit"><circle cx="${cx}" cy="${cy-R}" r="25" fill="url(#orbitGlow-${t.id})" opacity=".45"/><circle cx="${cx}" cy="${cy-R}" r="14" fill="url(#orbitGlow-${t.id})"/></g>
    ${nodes}
    <text x="${cx}" y="${cy-13}" text-anchor="middle" class="ring-amt countup" data-k="ring-${t.id}" data-to="${collected}" data-cur="${t.currency}">${money(collected,t.currency)}</text>
    <text x="${cx}" y="${cy+5}" text-anchor="middle" class="ring-lab">sur ${money(full,t.currency)}</text>
    <text x="${cx}" y="${cy+24}" text-anchor="middle" class="ring-name">${benName(t,r.beneficiary)}</text>
  </svg>`;
}

function seanceFP(r,s){ const base=r.code+'-'+s.id+'-'+reuPot(s); let x=0; for(let i=0;i<base.length;i++){x=((x<<5)-x+base.charCodeAt(i))|0;} return 'UB-'+Math.abs(x).toString(16).toUpperCase().slice(0,8); }

function dashGroup(t){
  const r=t.rounds[t.currentRound];
  const conf=r.contribs.filter((s,idx)=>s==='confirmed'&&t.members[idx]).length;
  const collected=conf*t.amount, pot=t.places*t.amount, pct=pot?Math.round(collected/pot*100):0;
  const declared=r.contribs.filter(s=>s==='declared').length;
  const complete=tontineComplete(t), closed=!!r.received, hasNext=t.currentRound+1<t.rounds.length;
  const renforced=!!t.renforced, hasComm=t.commissaireIdx!=null, renf=renforced&&hasComm;
  const certified=!!r.certified, recOK=r.contribs.indexOf('declared')<0;
  const commName=(t.commissaireIdx!=null&&t.members[t.commissaireIdx])?t.members[t.commissaireIdx].name:'';
  let closedTail='';

    } else {
      closedTail=((renf&&certified)?`<div class="reassure" style="margin-top:8px">✓ ${tr('dg_round_certified').replace('{n}',commName)}</div>`:'')+(complete?'':`<div style="margin-top:12px"><button class="btn btn-gold btn-sm" onclick="advanceRound('${t.id}')">${hasNext?tr('dg_open_next'):tr('dg_close_tontine')}</button></div>`);
    }
  }
  const govPanel=renforced?`<div class="panel"><div class="panel-h"><h3>${tr('gov_title')}</h3><span class="pill ${hasComm?'p-paid':'p-now'}">${hasComm?tr('gov_active'):tr('gov_pending')}</span></div><div style="padding:14px 20px">
      <div class="field" style="margin-top:0"><label>${tr('role_tresorier')}</label><select onchange="setTresorier('${t.id}',+this.value)">${t.members.map((m,i)=>m?`<option value="${i}" ${t.tresorierIdx===i?'selected':''}>${m.name}${m.role==='organisateur'?' ('+tr('role_org')+')':''}</option>`:'').join('')}</select></div>
      <div class="field"><label>${tr('role_commissaire')}</label><select onchange="setCommissaire('${t.id}',this.value===''?-1:+this.value)"><option value="" ${t.commissaireIdx==null?'selected':''}>${tr('gov_commissaire_none')}</option>${t.members.map((m,i)=>(m&&i!==t.tresorierIdx)?`<option value="${i}" ${t.commissaireIdx===i?'selected':''}>${m.name}</option>`:'').join('')}</select></div>
      <div class="msub">${t.commissaireIdx==null?tr('gov_pick_commissaire'):tr('gov_chain')}</div>
    </div></div>`:'';

  const rows=t.members.map((m,i)=>{
    if(!m) return `<div class="mrow slotrow">
      <div class="av slot">+</div>
      <div class="stack"><div class="mname faint">${tr('dg_slot_name')}</div><div class="msub">${tr('dg_slot_round').replace('{l}',t.rounds[i].label)}</div></div>
      <div class="right"><button class="btn btn-ghost btn-sm" onclick="state.tab='invite';render()">${tr('db_seg_invite')}</button></div></div>`;
    const isRecv=i===r.beneficiary, s=r.contribs[i], isFlash=state.flash==='t:'+t.id+':'+i;
    let action='';
    if(!closed){

    else if(s==='none') action=`<button class="btn btn-ghost btn-sm" onclick="orgConfirm('${t.id}',${i})">${tr('dg_mark_recv')}</button>`;
    else action=`<button class="btn btn-ghost btn-sm" onclick="orgUnconfirm('${t.id}',${i})">${tr('cancel')}</button>`;
    }
    return `<div class="mrow ${isFlash?'flash-row':''}">
      ${avatar(m.name,(isRecv?'recv':'')+(levelOf(t,i)>=2?' av-amb':''))}
      <div class="stack"><div class="mname">${m.name}${levelOf(t,i)>=2?ambBadge():''}${m.role==='organisateur'?`<span class="role">${tr('role_org')}</span>`:''}${isRecv?` <span class="pill p-now" style="margin-left:6px">${tr('dg_recv_now')}</span>`:''}</div>
        <div class="msub">${m.contact}</div>${s==='declared'?`<div class="msub" style="margin-top:2px">${tr('dg_ref')}: <b>${(r.payRef&&r.payRef[i])||'\u2014'}</b>${(r.payProof&&r.payProof[i])?` \u00b7 ${tr('dg_proof')}: ${esc(r.payProof[i])}`:` \u00b7 <span class="faint">${tr('dg_no_proof')}</span>`}</div>`:''}</div>
      <div class="right ${isFlash?'flash-ok':''}">${(s==='none'&&isLate(t,t.currentRound,i))?`<span class="pill p-late">${tr('st_late')}</span>`:statusPill(s)}${action}</div></div>`;
  }).join('');

  return `${complete?`<div class="panel" style="border-color:rgba(201,168,76,.5)"><div class="panel-h"><h3>${tr('dg_complete_t')}</h3><span class="pill p-paid">✓</span></div><div style="padding:16px 20px"><div class="reassure">${tr('dg_complete_d').replace('{p}',t.places)}</div></div></div>`:''}<div class="asnote">${tr('dg_asnote')}</div>
    <div class="panel">
      <div class="panel-h"><h3>${tr('dg_rotation')}</h3><span class="pill p-now">${tr('dg_round_x').replace('{n}',t.currentRound+1).replace('{p}',t.places)}</span></div>
      <div style="padding:12px 10px 18px">${rotationRing(t)}
        <div class="ring-legend"><span><i class="lg-done"></i>${tr('lg_done')}</span><span><i class="lg-now"></i>${tr('lg_now')}</span><span><i class="lg-soon"></i>${tr('lg_soon')}</span></div>${orderEditorHtml(t)}
      </div>
    </div>
${govPanel}
    <div class="panel">
      <div class="panel-h"><h3>${tr('dg_current_round').replace('{l}',r.label)}</h3><span class="pill p-now">${tr('dg_receives').replace('{n}',benName(t,r.beneficiary))}</span></div>
      <div style="padding:18px 20px">
        <div class="between"><span class="mid" style="font-size:13.5px">${tr('c_confirmed')}</span>
          <span style="font-weight:600"><span class="countup" data-k="tour-${t.id}" data-to="${collected}" data-cur="${t.currency}">${money(collected,t.currency)}</span> <span class="faint" style="font-weight:400">/ ${money(pot,t.currency)}</span></span></div>
        <div class="progress"><i style="width:${pct}%"></i></div>
        ${closed?`<div class="reassure" style="margin-top:10px">✓ ${tr('dg_round_closed').replace('{n}',benName(t,r.beneficiary))}</div>${closedTail}`:`<div class="msub" style="margin-top:8px">${tr('dg_conf_line').replace('{c}',conf).replace('{x}',declared?tr('dg_conf_extra').replace('{d}',declared):'')}</div>`}
      </div>
      <div>${rows}</div>
    </div>`;
}

  else myAction=`<div class="msub" style="margin-top:4px">${tr('dm_confirmed_recv')}</div>`;

  const autopay=!!me.autopay;

  let cagnotte='';

    <div class="panel"><div class="panel-h"><h3>${tr('dm_my_situation')}${isAmb?ambBadge('shine'):''}</h3></div>

    ${renderParcours(t,meIdx)}
    <div class="panel"><div class="panel-h"><h3>${tr('dm_my_reminders')}</h3></div>
      <div>
        <div class="notif"><div class="nic g">⏰</div><div class="ntext"><div class="nt">${tr('dm_rem_pay_t').replace('{l}',r.label)}</div><div class="nd">${tr('dm_rem_pay_d').replace('{x}',money(t.amount,t.currency))}</div></div></div>
        <div class="notif"><div class="nic b">◷</div><div class="ntext"><div class="nt">${tr('dm_rem_turn_t').replace('{w}',toGo>0?tr('dm_rem_approach'):toGo===0?tr('dm_rem_here'):tr('dm_rem_passed'))}</div><div class="nd">${tr('dm_rem_turn_d').replace('{l}',myRound?myRound.label:'—')}</div></div></div>
      </div>

}

function dashJournal(t){
  const pot=t.places*t.amount;
  const ev=[];
  for(let r=0;r<t.currentRound;r++){
    ev.push({type:'v',t:tr('dj_received').replace('{n}',benName(t,r)),d:tr('dj_received_d').replace('{l}',t.rounds[r].label).replace('{x}',money(pot,t.currency))});
  }
  t.rounds[t.currentRound].contribs.forEach((s,i)=>{
    if(!t.members[i])return;
    if(s==='confirmed')ev.push({type:'v',t:tr('dj_conf').replace('{n}',t.members[i].name),d:tr('dj_conf_d').replace('{l}',t.rounds[t.currentRound].label)});
    else if(s==='declared')ev.push({type:'g',t:tr('dj_decl').replace('{n}',t.members[i].name),d:tr('dj_decl_d')});
  });
  ev.reverse();
  const rows=ev.map(e=>`<div class="notif"><div class="nic ${e.type}">${e.type==='v'?'✓':'•'}</div>
    <div class="ntext"><div class="nt">${e.t}</div><div class="nd">${e.d}</div></div></div>`).join('');
  return `<div class="asnote">${tr('dj_asnote')}</div>
    <div class="releve-actions"><button class="btn btn-ghost btn-sm" onclick="openReleve('${t.id}','tontine')">${icon('doc')}${tr('dj_export')}</button></div>
    <div class="panel">${rows||`<div class="empty">${tr('dj_empty')}</div>`}</div>`;
}

/* ---------- actions ---------- */
async function declarePaid(id,i){const t0=getT(id),ci=t0?t0.currentRound:0,wasLate=!!(t0&&isLate(t0,ci,i));try{await db.declare(getT(id),i);}catch(e){alert(e.message);}if(wasLate&&BACKEND==='memory'){const t=getT(id);if(t&&t.rounds[ci]&&t.rounds[ci].lateMarks)t.rounds[ci].lateMarks[i]=true;}await refresh(id);}
function tonAttachProof(id,i){const t=getT(id);if(!t)return;const r=t.rounds[t.currentRound];const el=document.getElementById('proof-'+id+'-'+i);const v=el?String(el.value).trim():'';if(!v)return;r.payProof=r.payProof||[];r.payProof[i]=v;render();}
function tonAutoPay(id,i,on){const t=getT(id);if(!t||!t.members[i])return;t.members[i].autopay=!!on;render();}
async function orgConfirm(id,i){const t0=getT(id),ci=t0?t0.currentRound:0,wasLate=!!(t0&&isLate(t0,ci,i));try{await db.confirm(getT(id),i);state.flash='t:'+id+':'+i;}catch(e){alert(e.message);}if(wasLate&&BACKEND==='memory'){const t=getT(id);if(t&&t.rounds[ci]&&t.rounds[ci].lateMarks)t.rounds[ci].lateMarks[i]=true;}await refresh(id);}
async function orgUnconfirm(id,i){try{await db.unconfirm(getT(id),i);}catch(e){alert(e.message);}if(BACKEND==='memory'){const t=getT(id);if(t&&t.rounds[t.currentRound]&&t.rounds[t.currentRound].lateMarks)t.rounds[t.currentRound].lateMarks[i]=false;}await refresh(id);}
function addPlaces(id,k){
  const t=getT(id);
  if(BACKEND!=='memory'){alert(tr('al_grow_server'));return;}
  const old=t.places, add=Math.max(1,Math.min(10,k));
  t.places=old+add;
  for(let j=0;j<add;j++) t.members.push(null);
  t.rounds.forEach(rd=>{ while(rd.contribs.length<t.places) rd.contribs.push('none'); });
  const sm=(t.startMonth!=null)?t.startMonth:new Date().getMonth();
  for(let j=0;j<add;j++){
    const idx=old+j, off=t.rounds.length, d=new Date(2026,sm+off,5);
    t.rounds.push({beneficiary:idx,label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`,status:'soon',received:false,contribs:new Array(t.places).fill('none')});
  }
  saveLocal(); render();
}
async function confirmCagnotte(id){try{await db.cagnotte(getT(id));}catch(e){alert(e.message);}await refresh(id);}
function tontineComplete(t){return t.rounds.length>0 && t.rounds.every(r=>r.received && r.status==='done');}
function isLate(t,i,mi){const rd=t.rounds[i];if(!rd||rd.status!=='now')return false;if(rd.contribs[mi]!=='none')return false;return !!(rd.dueISO && rd.dueISO < EV_TODAY);}
function advanceRound(id){const t=getT(id);if(!t)return;const i=t.currentRound;const r=t.rounds[i];if(!r||!r.received)return;if(t.renforced&&t.commissaireIdx!=null&&!r.certified){alert(tr('al_await_cert'));return;}r.status='done';if(i+1<t.rounds.length){t.currentRound=i+1;t.rounds[i+1].status='now';}render();}
function setTresorier(id,idx){const t=getT(id);if(!t)return;t.tresorierIdx=idx;if(t.commissaireIdx===idx)t.commissaireIdx=null;render();}
function setCommissaire(id,idx){const t=getT(id);if(!t)return;if(idx==null||idx<0){t.commissaireIdx=null;render();return;}if(idx===t.tresorierIdx){alert(tr('al_comm_diff'));return;}t.commissaireIdx=idx;render();}
function tonCertify(id){const t=getT(id);if(!t)return;const r=t.rounds[t.currentRound];if(!r||!r.received||t.commissaireIdx==null)return;if(r.contribs.indexOf('declared')>=0){alert(tr('cac_need_confirm'));return;}r.certified=true;render();}
function tonBureau(t){return [...new Set([0,(t.tresorierIdx!=null?t.tresorierIdx:0),t.commissaireIdx].filter(x=>x!=null&&t.members[x]))];}
function tonApplySwap(t,pos){const a=t.rounds[pos],b=t.rounds[pos-1];const who=benName(t,a.beneficiary);const tmp=a.beneficiary;a.beneficiary=b.beneficiary;b.beneficiary=tmp;t.orderLog=t.orderLog||[];t.orderLog.unshift({who,ts:EV_TODAY});}
function tonOrderPropose(id,pos){const t=getT(id);if(!t)return;if((pos-1)<=t.currentRound)return;const bureau=tonBureau(t);if(bureau.length>=2){const by=bureau.indexOf(state.me)>=0?state.me:bureau[0];t.pendingOrder={pos,approvals:[by]};}else{tonApplySwap(t,pos);}render();}
function tonOrderApprove(id){const t=getT(id);if(!t||!t.pendingOrder)return;const bureau=tonBureau(t);const next=bureau.find(b=>t.pendingOrder.approvals.indexOf(b)<0);if(next!=null)t.pendingOrder.approvals.push(next);if([...new Set(t.pendingOrder.approvals)].length>=2){tonApplySwap(t,t.pendingOrder.pos);t.pendingOrder=null;}render();}
function tonOrderCancel(id){const t=getT(id);if(!t)return;t.pendingOrder=null;render();}
function orderEditorHtml(t){
  if(tontineComplete(t))return '';
  const cur=t.currentRound; const futures=[]; for(let i=cur+1;i<t.rounds.length;i++)futures.push(i);
  if(futures.length<2 && !(t.orderLog&&t.orderLog.length))return '';
  const bureau=tonBureau(t), hasBureau=bureau.length>=2;
  const rowsO=futures.map(i=>{const canUp=(i-1)>cur && !t.pendingOrder;return `<div class="mrow"><div class="stack"><div class="mname">${tr('dg_round_x').replace('{n}',i+1).replace('{p}',t.places)} \u00b7 ${esc(benName(t,t.rounds[i].beneficiary))}</div></div><div class="right">${canUp?`<button class="btn btn-ghost btn-sm" onclick="tonOrderPropose('${t.id}',${i})">${tr('dg_order_up')}</button>`:''}</div></div>`;}).join('');

function aggregateStats(name){
  let cyclesDone=0,doneTotal=0,lateTotal=0,isOrg=false,tontines=0;
  state_tontines.forEach(t=>{
    const i=t.members.findIndex(m=>m&&m.name===name); if(i<0) return;
    tontines++; if(t.members[i].role==='organisateur') isOrg=true;
    const done=t.rounds.filter(rd=>rd.status==='done'); doneTotal+=done.length;
    cyclesDone+=done.filter(rd=>rd.contribs[i]==='confirmed').length;
    lateTotal+=done.filter(rd=>rd.contribs[i]==='confirmed' && rd.lateMarks && rd.lateMarks[i]).length;
  });
  return {cyclesDone,onTime:doneTotal?Math.round(Math.max(0,cyclesDone-lateTotal)/doneTotal*100):100,lateTotal,isOrg,tontines};
}

function releveData(t,scope,mi){
  const pot=t.places*t.amount;
  if(scope==='me'){
    const name=t.members[mi]?t.members[mi].name:'—';
    const cols=[tr('rl_c_tour'),tr('rl_c_benef'),tr('rl_c_mvt'),tr('rl_c_amount'),tr('rl_c_cur'),tr('rl_c_statut')];
    const rows=[];
    t.rounds.forEach((rd,i)=>{
      if(i<=t.currentRound){
        const s=rd.contribs[mi];
        rows.push([rd.label,benName(t,rd.beneficiary),tr('rl_cotis'),t.amount,t.currency,
          s==='confirmed'?tr('rl_conf_recv'):s==='declared'?tr('rl_declared'):tr('rl_pending')]);
      }
      if(rd.beneficiary===mi){
        rows.push([rd.label,tr('rl_you'),tr('rl_recv_pot'),pot,t.currency,
          rd.received?tr('rl_recv_conf'):(i<t.currentRound?tr('rl_recv'):(i===t.currentRound?tr('rl_inprog'):tr('rl_upcoming')))]);
      }
    });
    return {title:tr('rl_title').replace('{n}',name),sub:`${t.name} · ${money(t.amount,t.currency)} · ${freqLabel(t.frequency)}`,cols,rows};
  }
  const cols=[tr('rl_c_tour'),tr('rl_c_benef'),tr('rl_c_echeance'),tr('rl_c_statut'),tr('rl_c_confirmed'),tr('rl_c_pot')];
  const rows=t.rounds.map((rd,i)=>{
    const conf=rd.contribs.filter((s,idx)=>s==='confirmed'&&t.members[idx]).length;
    const st=rd.status==='done'?tr('rl_done'):rd.status==='now'?tr('rl_inprog'):tr('rl_upcoming');
    return [String(i+1),benName(t,rd.beneficiary),rd.label,st,`${conf}/${filled(t)}`,`${pot} ${t.currency}`];
  });
  return {title:tr('rl_group_title').replace('{n}',t.name),sub:tr('rl_group_sub').replace('{x}',money(t.amount,t.currency)).replace('{f}',freqLabel(t.frequency)).replace('{m}',filled(t)),cols,rows};
}

function downloadCSV(){
  const t=getT(state.active);const d=releveData(t,state.releveScope,state.releveMember);
  const all=[d.cols,...d.rows];
  const csv=all.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(state.releveScope==='me'?'releve-membre':'releve-tontine')+'.csv';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},120);
}

function startCaisse(){cDraft={group:'',name:'',type:'deces',currency:'CAD',federation:'',pres:state.user,tres:'',comm:'',cot:'',freq:'mensuelle'};go('caissecreate');}
function cRead(){ if(!cDraft)return; const g=(id,d)=>{const el=$('#'+id);return el?el.value:d;};
  cDraft.group=g('c-group',cDraft.group);cDraft.name=g('c-name',cDraft.name);cDraft.type=g('c-type',cDraft.type);
  cDraft.currency=g('c-cur',cDraft.currency);cDraft.federation=g('c-fed',cDraft.federation);
  cDraft.pres=g('c-pres',cDraft.pres);cDraft.tres=g('c-tres',cDraft.tres);cDraft.comm=g('c-comm',cDraft.comm);
  cDraft.cot=g('c-cot',cDraft.cot);cDraft.freq=g('c-freq',cDraft.freq);
}
function cSave(){cRead();
  if(!cDraft.group.trim()){alert(tr('al_cc_group'));return;}
  const name=cDraft.name.trim()||tr('cc_name_default').replace('{g}',cDraft.group.trim());
  const creator=cDraft.pres.trim()||state.user||tr('cc_you');
  state_caisses.unshift({
    id:'c'+Date.now(), group:cDraft.group.trim(), name, type:cDraft.type, currency:cDraft.currency,
    federation: (cDraft.federation||'').trim()||null,
    cotisation:{montant:Number(cDraft.cot)||0, frequence:cDraft.freq}, fonds:0,
    bureau:[{name:creator,role:'president'},{name:cDraft.tres.trim()||'—',role:'tresorier'},{name:cDraft.comm.trim()||'—',role:'commissaire'}],
    foyers:[{name:'Foyer '+creator, contact:'—', aJour:true}],
    appels:[],
    seed:[{ts:new Date().toLocaleDateString(state.lang==='en'?'en-GB':'fr-FR',{day:'numeric',month:'long',year:'numeric'}),type:'a',
      what:tr('cc_seed_created').replace('{c}',creator).replace('{n}',name)+((cDraft.federation&&cDraft.federation!=='Aucun')?tr('cc_seed_net').replace('{f}',cDraft.federation):'.')}]
  });
  const id=state_caisses[0].id; cDraft=null;
  if(BACKEND==='supabase'){db.saveCaisse(getC(id)).then(()=>openCaisse(id)).catch(e=>alert('Enregistrement échoué : '+(e.message||e)));return;}
  saveLocal(); openCaisse(id);
}

function caisseAppelCard(c,a){
  const role=state.caisseRole;
  const conf=a.versements.filter(s=>s==='confirmed').length;
  const target=c.foyers.length*a.montant, collected=conf*a.montant, pct=target?Math.round(collected/target*100):0;
  const decl=a.versements.filter(s=>s==='declared').length;
  const rows=c.foyers.map((f,i)=>{
    const s=a.versements[i]; let action='';
    if(a.statut==='ouvert'){
      if(role==='membre'){ if(i===state.caisseFoyer){
        if(s==='none')action=`<button class="btn btn-gold btn-sm" onclick="caisseDeclare('${c.id}','${a.id}',${i})">${tr('cac_paid')}</button>`;
        else if(s==='declared')action=`<span class="msub">${tr('cac_wait_conf')}</span>`; } }
      else if(role==='tresorier'){
        if(s==='declared')action=`<button class="btn btn-green btn-sm" onclick="caisseConfirm('${c.id}','${a.id}',${i})">${tr('cac_confirm')}</button>`;
        else if(s==='none')action=`<button class="btn btn-ghost btn-sm" onclick="caisseConfirm('${c.id}','${a.id}',${i})">${tr('cac_mark')}</button>`;
        else action=`<button class="btn btn-ghost btn-sm" onclick="caisseUnconfirm('${c.id}','${a.id}',${i})">${tr('cancel')}</button>`; }
    }
    const meTag=(role==='membre'&&i===state.caisseFoyer)?` <span class="pill p-now" style="margin-left:6px">${tr('cac_myhh')}</span>`:'';
    const lateTag=!f.aJour?` <span class="pill p-late" style="margin-left:6px">${tr('cac_late')}</span>`:'';
    const isFlash=state.flash==='c:'+c.id+':'+a.id+':'+i;
    return `<div class="mrow ${isFlash?'flash-row':''}">${avatar(f.name.replace('Foyer ',''))}
      <div class="stack"><div class="mname">${f.name}${meTag}${lateTag}</div><div class="msub">${f.contact}</div></div>
      <div class="right ${isFlash?'flash-ok':''}">${cPill(s)}${action}</div></div>`;
  }).join('');
  let footerBox='';
  if(a.statut==='ouvert'&&role==='tresorier'){
    footerBox=caisseReceptionsValidees(a)
      ? `<div style="padding:14px 20px;border-top:1px solid var(--line)"><button class="btn btn-gold btn-sm" onclick="caisseRemis('${c.id}','${a.id}')">${tr('cac_remis_close').replace('{x}',money(collected,c.currency))}</button></div>`
      : `<div style="padding:14px 20px;border-top:1px solid var(--line)"><span class="msub">⚠️ ${tr('cac_need_confirm')}</span></div>`;
  }
  if(a.remis){
    const certBox=!caisseHasCommissaire(c)?''
      :(a.certifie?`<span class="certified">${tr('cac_certified_by').replace('{n}',caisseRoleName(c,'commissaire'))}</span>`
      :(role==='commissaire'?`<button class="btn btn-ghost btn-sm" onclick="caisseCertify('${c.id}','${a.id}')">${tr('cac_certify')}</button>`
        :`<span class="msub">${tr('cac_wait_cert')}</span>`));
    footerBox=`<div style="padding:14px 20px;border-top:1px solid var(--line)"><div class="between" style="flex-wrap:wrap;gap:10px">
      <span class="mid" style="font-size:13px">${tr('cac_handed').replace('{x}','<b>'+money(a.total,c.currency)+'</b>').replace('{b}',a.beneficiaire).replace('{d}',a.remisLe)}</span>${certBox}</div></div>`;
  }
  const statutPill=a.statut==='ouvert'?`<span class="pill p-appel">${tr('cac_open')}</span>`:`<span class="pill p-done">${tr('cac_closed')}</span>`;
  return `<div class="panel">
    <div class="panel-h appel-head"><h3>${a.motif}</h3>${statutPill}</div>
    <div style="padding:16px 20px 6px">
      <div class="appel-meta">${tr('cac_meta').replace('{st}',a.sousType).replace('{b}',a.beneficiaire).replace('{o}',a.ouvertLe).replace('{e}',a.echeance)}</div>
      <div class="between" style="margin-top:12px"><span class="mid" style="font-size:13.5px">${tr('cac_collected')}</span>
        <span class="ap-target"><span class="countup" data-k="appel-${a.id}" data-to="${collected}" data-cur="${c.currency}">${money(collected,c.currency)}</span> <span class="faint" style="font-weight:400">/ ${money(target,c.currency)}</span></span></div>
      <div class="progress"><i style="width:${pct}%"></i></div>
      <div class="msub" style="margin-top:8px">${tr('cac_paid_line').replace('{c}',conf).replace('{x}',money(a.montant,c.currency)).replace('{extra}',decl?tr('cac_paid_extra').replace('{d}',decl):'')}</div>
    </div>
    <div>${rows}</div>${footerBox}</div>`;
}

function startHandover(cId,idx){state.handover={cId,idx};render();}
function cancelHandover(){state.handover=null;render();}
function doHandover(){

  const el=$('#ho-name'), nv=el?el.value.trim():''; if(!nv){if(el)el.focus();return;}
  const b=c.bureau[idx], from=b.name;
  const today=new Date().toLocaleDateString('fr-FR',{year:'numeric',month:'short',day:'numeric'});
  c.passations=c.passations||[];
  c.passations.unshift({role:b.role,from,to:nv,date:today,by:state.user});
  b.name=nv; state.handover=null; saveLocal(); render();
}

     <div class="right">${f.aJour?`<span class="pill p-paid">${tr('cfy_uptodate')}</span>`:`<span class="pill p-late">${tr('cfy_late')}</span>`}</div></div>`).join('');
  return `<div class="asnote">${tr('cfy_asnote')}</div>

      <div class="passa-zone">${passaRows}</div></div>
    <div class="panel"><div class="panel-h"><h3>${tr('cfy_passa_log')}</h3><span class="pill p-soon">append-only</span></div>
      <div style="padding:6px 4px">${passaLog}</div>
      <div style="padding:0 20px 14px"><div class="msub">${tr('cfy_passa_note')}</div></div></div>
    <div class="panel"><div class="panel-h"><h3>${tr('cfy_covered')}</h3><span class="pill p-soon">${c.foyers.length}</span></div>
      <div style="padding:14px 20px 4px"><div class="msub">${tr('cfy_cotis_note').replace('{x}',money(c.cotisation.montant,c.currency)).replace('{f}',freqLabel(c.cotisation.frequence)).replace('{fund}',money(c.fonds,c.currency))}</div></div>
      <div>${rows}</div></div>`;
}

function caisseJournal(c){
  const ev=[];
  c.appels.forEach(a=>{
    if(a.remis)ev.push({ts:a.remisLe||'',type:'v',what:tr('cj_handed').replace('{x}',money(a.total,c.currency)).replace('{b}',a.beneficiaire).replace('{motif}',a.motif).replace('{cert}',a.certifie?tr('cj_cert_suffix').replace('{n}',caisseRoleName(c,'commissaire')):'')});
    a.versements.forEach((s,i)=>{
      if(s==='confirmed')ev.push({ts:'',type:'v',what:tr('cj_conf').replace('{hh}',c.foyers[i].name).replace('{n}',caisseRoleName(c,'tresorier')).replace('{motif}',a.motif)});
      else if(s==='declared')ev.push({ts:'',type:'a',what:tr('cj_decl').replace('{hh}',c.foyers[i].name).replace('{motif}',a.motif)});
    });
  });
  (c.seed||[]).forEach(e=>ev.push(e));
  const rows=ev.map(e=>`<div class="notif"><div class="nic ${e.type==='v'?'v':'g'}">${e.type==='v'?'✓':'•'}</div>
    <div class="ntext"><div class="nt">${e.what}</div><div class="nd">${e.ts||tr('cj_caisse_of').replace('{g}',c.group)}</div></div></div>`).join('');
  return `<div class="asnote">${tr('cj_asnote')}</div>
    <div class="releve-actions"><button class="btn btn-ghost btn-sm" onclick="caisseCSV('${c.id}')">${icon('doc')}${tr('cap_export_csv')}</button></div>
    <div class="panel">${rows||`<div class="empty">${tr('cj_empty')}</div>`}</div>`;
}

function caisseDeclare(cId,aId,fi){getC(cId).appels.find(a=>a.id===aId).versements[fi]='declared';cPersist(cId);render();}
function caisseConfirm(cId,aId,fi){getC(cId).appels.find(a=>a.id===aId).versements[fi]='confirmed';state.flash='c:'+cId+':'+aId+':'+fi;cPersist(cId);render();}
function caisseUnconfirm(cId,aId,fi){getC(cId).appels.find(a=>a.id===aId).versements[fi]='none';cPersist(cId);render();}
function caisseReceptionsValidees(a){return !!(a&&a.versements)&&a.versements.indexOf('declared')<0;}
function caisseHasCommissaire(c){if(!c)return false;return ((c.bureau||[]).concat(c.members||[])).some(m=>m&&m.role==='commissaire');}
function caisseRemis(cId,aId){const a=getC(cId).appels.find(x=>x.id===aId);
  if(!caisseReceptionsValidees(a)){alert(tr('cac_need_confirm'));return;}
  a.total=a.versements.filter(s=>s==='confirmed').length*a.montant; a.remis=true; a.statut='clos'; a.remisLe=tr('cj_today'); cPersist(cId); render();}
function caisseCertify(cId,aId){const c=getC(cId);const a=c&&c.appels.find(x=>x.id===aId);
  if(!a||!a.remis||!caisseReceptionsValidees(a)||!caisseHasCommissaire(c)){alert(tr('cac_need_tresorier'));return;}
  a.certifie=true;cPersist(cId);render();}
function caisseCreateAppel(cId){const c=getC(cId);
  const motif=($('#ap-motif').value||'').trim(); if(!motif){alert(tr('al_cap_motif'));return;}
  const benef=($('#ap-benef').value||'').trim()||'—';

  c.appels.unshift({id:'a'+Date.now(),motif,beneficiaire:benef,sousType:$('#ap-type').value,montant,
    ouvertLe:tr('cj_today'),echeance:($('#ap-echeance').value||'').trim()||'—',statut:'ouvert',remis:false,certifie:false,
    versements:new Array(c.foyers.length).fill('none')});

function caisseCSV(cId){const c=getC(cId);
  const lines=[[tr('csv_caisse'),c.name],[tr('csv_group'),c.group],[tr('csv_type'),typeCaisseLabel(c.type)],[],
    [tr('csv_h_appel'),tr('csv_h_nature'),tr('csv_h_benef'),tr('csv_h_foyer'),tr('csv_h_statut'),tr('csv_h_amount')+' ('+c.currency+')']];
  c.appels.forEach(a=>c.foyers.forEach((f,i)=>{const s=a.versements[i];
    lines.push([a.motif,a.sousType,a.beneficiaire,f.name,s==='confirmed'?tr('csv_paid'):s==='declared'?tr('csv_declared'):tr('csv_topay'),s==='confirmed'?a.montant:0]);}));
  const csv=lines.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}),el=document.createElement('a');
  el.href=URL.createObjectURL(blob);el.download='caisse-'+c.group.toLowerCase().replace(/\s+/g,'-')+'.csv';
  document.body.appendChild(el);el.click();setTimeout(()=>{URL.revokeObjectURL(el.href);el.remove();},120);}

function entraideCard(c,a){
  const ton=TON_EVENT[a.ton]||TON_EVENT.sobre;
  const conf=a.versements.filter(s=>s==='confirmed').length, tot=c.foyers.length;
  const part=a.montant, fee=uboraFee(part), total=part+fee;
  const contribs=contributorsOf(c,a), cCount=contribs.length, aCount=new Set(contribs.map(x=>x.assoc)).size;
  const st=memberState(a.id), reminder=a.joursRestants<=7 && st!=='authorized';
  let zone;
  if(!state.mandate){
    zone=`<div class="ev-zone"><div class="msub" style="margin-bottom:9px">${tr('ec2_quotepart')} <b>${money(part,c.currency)}</b> <span class="faint">+ ${tr('ev_plusfees')} ${money(fee,c.currency)}</span></div>
      <button class="btn btn-ghost btn-sm" onclick="go('mandate')">${tr('ec2_activate_pay')}</button></div>`;
  } else if(st==='declined'){
    zone=`<div class="ev-zone"><span class="pill p-due">${tr('ec2_declined')}</span>
      <button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="consentAuthorize('${a.id}')">${tr('ec2_finally')}</button></div>`;
  } else if(st==='authorized'){
    zone=`<div class="ev-zone"><span class="pill p-paid">${tr('ec2_authorized')}</span>
      <div class="msub" style="margin-top:8px">${money(total,c.currency)} ${tr('ec2_will_debit').replace('{d}',a.echeance)}</div></div>`;
  } else {
    zone=`<div class="ev-zone">
      <div class="msub" style="margin-bottom:9px">${tr('ec2_notice').replace('{x}',money(part,c.currency)).replace('{f}',money(fee,c.currency)).replace('{d}',a.echeance)}</div>
      <div class="row-gap"><button class="btn btn-gold btn-sm" onclick="consentAuthorize('${a.id}')">${tr('ec2_let_do')}</button>
        <button class="btn btn-ghost btn-sm" onclick="consentDecline('${a.id}')">${tr('ec2_decline_now')}</button></div></div>`;
  }
  const nudge = (a.ton==='joyeux' && st==='authorized')
    ? `<div class="ev-nudge click" onclick="go('apex')">${tr("ec2_nudge")}</div>` : "";
  const tag = reminder
    ? `<span class="pill p-late">${tr('ec2_close')}</span>`
    : `<span class="pill ${a.ton==='joyeux'?'p-now':'p-appel'}">${ton.ic} ${tr('ton_'+a.ton)}</span>`;
  return `<div class="card caisse-card" style="border-left-color:${a.ton==='joyeux'?'var(--gold-bright)':'var(--core)'}">
    <div class="between"><div class="t-name">${a.motif}</div>${tag}</div>

    <div class="progress"><i style="width:${Math.round(conf/tot*100)}%"></i></div>
    ${zone}${nudge}

      <span class="reg-count">${icon('doc')} ${cCount} ${cCount>1?tr('rg_contributors'):tr('rg_contributor')}${aCount>1?` · ${aCount} ${tr('et_assocs')}`:''}</span>

  return c.foyers.map((f,i)=>({name:f.name.replace(/^Foyer /,''),assoc:c.group,named:true,_st:a.versements[i]}))
    .filter(x=>x._st==='confirmed'||x._st==='declared');

  if(x.name===state.entraideMember && state.anonSelf) return tr('rg_anon_you');

}

/* ---------- apex : la méthode UBORA, investir ensemble (seuil indigo) ---------- */
/* --- conversion de devises (taux indicatifs — un taux réel sera utilisé en production) --- */
const FX={EUR:1,CHF:0.94,USD:1.08,GBP:0.85,CAD:1.47,MAD:10.8,XAF:655.957,XOF:655.957,NGN:1700,ZAR:20,FCFA:655.957}; /* unités par 1 EUR */
const APEX_CURS=['CHF','EUR','USD','GBP','CAD','MAD','FCFA'];
const APEX_CALC=['CHF','EUR','USD','GBP','CAD','MAD','FCFA'];  /* devises supportées par la page calculateurs */
/* pays de résidence → devise de base de l'abonné */
const COUNTRY_CUR={'Suisse':'CHF','France':'EUR','Belgique':'EUR','Allemagne':'EUR','Italie':'EUR','Espagne':'EUR','Portugal':'EUR','Pays-Bas':'EUR','Royaume-Uni':'GBP','États-Unis':'USD','Canada':'CAD','Maroc':'MAD','Cameroun':'XAF','Gabon':'XAF','Tchad':'XAF','Congo':'XAF','Centrafrique':'XAF','Guinée équatoriale':'XAF','Sénégal':'XOF','Côte d\u2019Ivoire':'XOF','Mali':'XOF','Bénin':'XOF','Burkina Faso':'XOF','Togo':'XOF','Niger':'XOF','Nigeria':'NGN','Afrique du Sud':'ZAR'};
const COUNTRIES=Object.keys(COUNTRY_CUR);
function fxBase(c){return (c==='FCFA')?'XAF':c;}
function fxConvert(amount,from,to){const f=FX[fxBase(from)]||1,g=FX[fxBase(to)]||1;return amount/f*g;}
function monthlyOf(t){const m={mensuelle:1,quinzaine:2,hebdo:4.333,trimestrielle:1/3,annuelle:1/12};return t.amount*(m[t.frequency]||1);}
function homeCurrency(){return COUNTRY_CUR[state.homeCountry]||'EUR';}
function apexCur(){return state.apexCur||homeCurrency();}   /* défaut = devise du pays de résidence ; l'abonné reste maître */
function figuresIn(dc){
  let mobilise=0,monthly=0;
  state_tontines.forEach(t=>{
    const i=t.members.findIndex(m=>m&&m.name===state.user); if(i<0) return;   /* uniquement ses cercles */
    mobilise+=fxConvert(t.amount*t.places, t.currency, dc);   /* ce que le cercle lui fait mettre de côté sur un cycle */
    monthly +=fxConvert(monthlyOf(t), t.currency, dc);
  });

function pMonthLabel(m){const [y,mo]=m.split('-').map(Number);
  const fr=['','janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const en=['','January','February','March','April','May','June','July','August','September','October','November','December'];
  const arr=state.lang==='en'?en:fr; return (arr[mo]||'')+' '+y; }
function pMemberName(p,i){return (p.members[i]&&p.members[i].name)||'?';}
function pMyIndex(p){const i=p.members.findIndex(m=>m.name===state.user);return i<0?(p.me||0):i;}
function pMyCur(p){const i=pMyIndex(p);return (p.members[i]&&p.members[i].cur)||p.cur;}

function pShares(p,e){ /* -> {memberIdx: part en devise du groupe} */
  const amt=fxConvert(e.amount,e.cur,p.cur);
  const sp=e.split||{mode:'egal'};
  const incl=(sp.with&&sp.with.length)?sp.with.slice():p.members.map((m,i)=>i);
  const out={};
  if(sp.mode==='exact'){ incl.forEach(i=>{out[i]=fxConvert((+(sp.shares&&sp.shares[i])||0),e.cur,p.cur);}); return out; }
  if(sp.mode==='parts'){ let tot=0; incl.forEach(i=>{tot+=(+(sp.shares&&sp.shares[i])||1);}); if(!tot)tot=incl.length;
    incl.forEach(i=>{const w=(+(sp.shares&&sp.shares[i])||1); out[i]=amt*w/tot;}); return out; }
  const each=amt/incl.length; incl.forEach(i=>{out[i]=each;}); return out;
}
function pBalances(p){ /* net par membre en devise du groupe ; + = on lui doit */
  const bal=new Array(p.members.length).fill(0);
  p.expenses.forEach(e=>{
    if(e.split&&e.split.mode==='offert')return; /* cadeau : aucune dette */
    bal[e.payer]+=fxConvert(e.amount,e.cur,p.cur);
    const sh=pShares(p,e); Object.keys(sh).forEach(k=>{bal[+k]-=sh[k];});
  });
  (p.settlements||[]).forEach(s=>{ if(s.status!=='confirmed')return;
    const a=fxConvert(s.amount,s.cur||p.cur,p.cur); bal[s.from]+=a; bal[s.to]-=a; });
  return bal;
}
function pSettleSuggest(p){ /* virements minimisés, en devise du groupe */
  const bal=pBalances(p).map((v,i)=>({i,v:Math.round(v)}));
  const C=bal.filter(b=>b.v>0).sort((a,b)=>b.v-a.v).map(x=>({...x}));
  const D=bal.filter(b=>b.v<0).map(b=>({i:b.i,v:-b.v})).sort((a,b)=>b.v-a.v).map(x=>({...x}));
  const res=[]; let ci=0,di=0;
  while(ci<C.length&&di<D.length){ const give=Math.min(C[ci].v,D[di].v);
    if(give>0)res.push({from:D[di].i,to:C[ci].i,amount:give});
    C[ci].v-=give; D[di].v-=give; if(C[ci].v<=0)ci++; if(D[di].v<=0)di++; }
  return res;
}
function pSettleMarkSent(pid,from,to,amount){const p=getP(pid);if(!p)return;p.settlements=p.settlements||[];
  let s=p.settlements.find(x=>x.from===from&&x.to===to&&x.status!=='confirmed');
  if(s){s.status='sent';s.amount=amount;s.cur=p.cur;}else p.settlements.push({from,to,amount,cur:p.cur,status:'sent'});render();}
function pSettleConfirm(pid,from,to){const p=getP(pid);if(!p)return;
  const s=(p.settlements||[]).find(x=>x.from===from&&x.to===to&&x.status==='sent');if(s)s.status='confirmed';render();}
function pSettleCancel(pid,from,to){const p=getP(pid);if(!p)return;
  p.settlements=(p.settlements||[]).filter(x=>!(x.from===from&&x.to===to&&x.status==='sent'));render();}
function pPay(pid,from,to){const p=getP(pid);if(!p)return;const view=state.partageViewCur||p.cur;
  const el=document.getElementById('pay-'+pid+'-'+from+'-'+to);let raw=el?String(el.value).replace(',','.'):'';let val=parseFloat(raw);
  if(!(val>0)){return;}
  const inCur=Math.round(fxConvert(val,view,p.cur));if(inCur<=0)return;
  pSettleMarkSent(pid,from,to,inCur);}

function federationsList(){
  const set=new Set(); state_caisses.forEach(c=>{ if(c.federation) set.add(c.federation); });

function rosterFor(fed){
  const fromCaisses=state_caisses.filter(c=>c.federation===fed).map(c=>({nom:c.group,ville:'—',membres:c.foyers.length,surUbora:true}));
  const seen=new Set(fromCaisses.map(x=>x.nom));
  const approved=(state.fedRequests||[]).filter(r=>r.fed===fed&&r.status==='approved'&&!seen.has(r.assoc)).map(r=>{seen.add(r.assoc);return{nom:r.assoc,ville:r.country||'—',membres:0,surUbora:true};});
  const seeded=(fed==='RPN')?RESEAU_RPN.annuaire.filter(x=>!seen.has(x.nom)).map(x=>({...x,surUbora:true})):[];
  return fromCaisses.concat(approved,seeded);
}

function eventStats(ev){
  const tickets=ev.billets.reduce((s,b)=>s+b.vendus,0);
  const collected=ev.billets.reduce((s,b)=>s+b.vendus*b.prix,0);
  return {tickets,collected};
}
function openEvent(id){state.activeEvent=id;state.reportFor=null;state.reportDone=null;go('event');}
function buyTicket(id,i){const ev=state_events.find(x=>x.id===id);if(!ev)return;ev.billets[i].vendus++;if(BACKEND==='supabase'){db.saveEvent(ev).catch(()=>{});}else saveLocal();render();}

/* ---------- création d'événement (self-service, billets composables) ---------- */
let eDraft=null;
function startEvent(){eDraft={editId:null,title:'',type:'gala',category:'culturel',country:'',city:'',openToAll:true,visibility:'public',audience:'',dateISO:'',date:'',lieu:'',group:'',currency:'CAD',objectif:'',desc:'',visual:'',billets:[{nom:'Entrée standard',prix:''}],ed1n:'',ed1c:'',ed2n:'',ed2c:''};go('eventcreate');}
function eRead(){ if(!eDraft)return;
  const g=(id,d)=>{const el=$('#'+id);return el?el.value:d;};
  eDraft.title=g('e-title',eDraft.title);eDraft.type=g('e-type',eDraft.type);eDraft.date=g('e-date',eDraft.date);
  eDraft.lieu=g('e-lieu',eDraft.lieu);eDraft.group=g('e-group',eDraft.group);eDraft.currency=g('e-cur',eDraft.currency);
  eDraft.objectif=g('e-obj',eDraft.objectif);eDraft.desc=g('e-desc',eDraft.desc);
  eDraft.category=g('e-cat',eDraft.category);eDraft.country=g('e-country',eDraft.country);eDraft.city=g('e-city',eDraft.city);eDraft.dateISO=g('e-dateiso',eDraft.dateISO);
  eDraft.visibility=g('e-visibility',eDraft.visibility);eDraft.audience=g('e-audience',eDraft.audience);
  {const oc=$('#e-open');if(oc)eDraft.openToAll=oc.checked;}
  eDraft.ed1n=g('e-ed1n',eDraft.ed1n);eDraft.ed1c=g('e-ed1c',eDraft.ed1c);eDraft.ed2n=g('e-ed2n',eDraft.ed2n);eDraft.ed2c=g('e-ed2c',eDraft.ed2c);
  eDraft.billets=eDraft.billets.map((b,i)=>({nom:g('e-tn'+i,b.nom),prix:g('e-tp'+i,b.prix)}));
}
function eAddTier(){eRead();eDraft.billets.push({nom:'',prix:''});render();}
function eRemoveTier(i){eRead();eDraft.billets.splice(i,1);if(!eDraft.billets.length)eDraft.billets.push({nom:'',prix:''});render();}
function eVisual(input){
  const f=input&&input.target&&input.target.files&&input.target.files[0]; if(!f)return;
  if(f.size>4*1024*1024){alert(tr('al_visual_big'));input.target.value='';return;}
  const reader=new FileReader();
  reader.onload=ev=>{ const img=new Image();
    img.onload=()=>{ const max=1000, sc=Math.min(1,max/img.width);
      const cw=Math.max(1,Math.round(img.width*sc)), ch=Math.max(1,Math.round(img.height*sc));
      const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
      cv.getContext('2d').drawImage(img,0,0,cw,ch);
      eRead(); try{eDraft.visual=cv.toDataURL('image/jpeg',0.82);}catch(e){eDraft.visual=ev.target.result;} render(); };
    img.onerror=()=>{ eRead(); eDraft.visual=ev.target.result; render(); };
    img.src=ev.target.result; };
  reader.readAsDataURL(f);
}
function eVisualRemove(){eRead();eDraft.visual='';render();}
function eSave(){eRead();
  if(!eDraft.title.trim()){alert(tr('al_need_title'));return;}
  const tiers=eDraft.billets.filter(b=>String(b.nom).trim()&&b.prix!=='').map(b=>({nom:String(b.nom).trim(),prix:Number(b.prix)||0,vendus:0}));
  if(!tiers.length){alert(tr('al_need_ticket'));return;}
  const editors=[{nom:eDraft.ed1n,contact:eDraft.ed1c},{nom:eDraft.ed2n,contact:eDraft.ed2c}]
    .filter(x=>String(x.nom).trim()).map(x=>({nom:String(x.nom).trim(),contact:String(x.contact).trim()}));
  const _dispDate=eDraft.dateISO?evDateLabel(eDraft.dateISO):((eDraft.date&&eDraft.date.trim())||'à venir');
  const _extra={category:eDraft.category||'autre',country:(eDraft.country||'').trim(),city:(eDraft.city||'').trim(),openToAll:!!eDraft.openToAll,dateISO:eDraft.dateISO||'',visibility:eDraft.visibility||'public',audience:(eDraft.visibility==='private'&&eDraft.audience)?String(eDraft.audience).split(',').map(s=>s.trim()).filter(Boolean):[]};
  if(eDraft.editId){
    const ev=state_events.find(x=>x.id===eDraft.editId);
    if(ev){ tiers.forEach(t=>{const old=ev.billets.find(b=>b.nom===t.nom);if(old)t.vendus=old.vendus;});
      Object.assign(ev,{category:_extra.category,country:_extra.country,city:_extra.city,openToAll:_extra.openToAll,dateISO:_extra.dateISO,title:eDraft.title.trim(),type:eDraft.type,date:_dispDate,lieu:eDraft.lieu.trim()||'—',
        currency:eDraft.currency,objectif:Number(eDraft.objectif)||0,desc:eDraft.desc.trim(),group:eDraft.group.trim()||ev.group,visual:eDraft.visual||'',billets:tiers,editors}); }
    const id=eDraft.editId; eDraft=null;
    if(BACKEND==='supabase'&&ev){ db.saveEvent(ev).then(()=>openEvent(id)).catch(e=>alert('Enregistrement échoué : '+(e.message||e))); return; }
    saveLocal(); openEvent(id); return;
  }
  const _newEv={id:'e'+Date.now(),creator:state.user,editors,group:eDraft.group.trim()||'Mon groupe',type:eDraft.type,category:_extra.category,country:_extra.country,city:_extra.city,openToAll:_extra.openToAll,visibility:_extra.visibility,audience:_extra.audience,dateISO:_extra.dateISO,postedISO:EV_TODAY,title:eDraft.title.trim(),
    date:_dispDate,lieu:eDraft.lieu.trim()||'—',currency:eDraft.currency,
    objectif:Number(eDraft.objectif)||0,desc:eDraft.desc.trim(),visual:eDraft.visual||'',billets:tiers};
  state_events.unshift(_newEv);
  eDraft=null;
  if(BACKEND==='supabase'){ db.saveEvent(_newEv).then(()=>go('events')).catch(e=>alert('Enregistrement échoué : '+(e.message||e))); return; }
  saveLocal();go('events');
}
function canEditEvent(ev){ if(!ev)return false; if(ev.creator&&ev.creator===state.user)return true; return (ev.editors||[]).some(e=>e.nom===state.user); }

/* ---------- modération / signalement (anti-spam du fil public) ---------- */
const REPORT_THRESHOLD=3;
function evReportCount(ev){return (ev.reports||[]).length;}
function evMasked(ev){return evReportCount(ev)>=REPORT_THRESHOLD;}        /* masqué auto au seuil */
function evHidden(ev){return !!ev.removed || evMasked(ev);}                /* invisible au public */
function openReport(id){state.reportFor=id;render();}
function cancelReport(){state.reportFor=null;render();}
function submitReport(id,reason){
  const ev=state_events.find(x=>x.id===id); if(!ev)return;
  ev.reports=ev.reports||[]; ev.reports.push({reason,ts:Date.now()});
  state.reportFor=null; state.reportDone=id; saveLocal(); render();
}
function modClearReports(id){const ev=state_events.find(x=>x.id===id);if(!ev)return;ev.reports=[];ev.removed=false;state.reportDone=null;saveLocal();render();}
function modToggleRemove(id){const ev=state_events.find(x=>x.id===id);if(!ev)return;ev.removed=!ev.removed;saveLocal();render();}
function reportReasonsSummary(ev){
  const m={}; (ev.reports||[]).forEach(r=>{m[r.reason]=(m[r.reason]||0)+1;});
  return Object.keys(m).map(k=>`${tr('reason_'+k)} (${m[k]})`).join(' · ');
}

function ctToggle(id,f){const c=state_contacts.find(x=>x.id===id);if(!c||c.bereavement)return;c[f]=!c[f];saveLocal();render();}
function ctParse(text){
  return String(text||'').split(/\r?\n+/).map(l=>l.trim()).filter(Boolean).map(l=>{
    const parts=l.split(/[,;\t]/).map(x=>x.trim());
    const email=parts.find(x=>/@/.test(x))||'';
    const phone=parts.find(x=>/^[+0-9][0-9 ()\-]{6,}$/.test(x))||'';
    const name=parts.find(x=>x&&x!==email&&x!==phone)||email||phone;
    return {name,email,phone};
  }).filter(c=>c.email||c.phone);
}
function ctAdd(list){let n=0;
  list.forEach(c=>{state_contacts.push({id:uid('k'),name:c.name||c.email||c.phone,email:c.email||'',phone:c.phone||'',announce:false,news:false,bereavement:false,introSent:false,cat:'import',source:tr('df_pending')});n++;});
  if(n)saveLocal(); return n;
}
function ctImport(){const ta=$('#diff-import');const list=ctParse(ta?ta.value:'');if(!list.length){alert(tr('df_import_empty'));return;}const n=ctAdd(list);alert(tr('df_imported_n').replace('{n}',n));render();}
function ctImportFile(input){const f=input&&input.target&&input.target.files&&input.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const n=ctAdd(ctParse(e.target.result));alert(tr('df_imported_n').replace('{n}',n));render();};r.readAsText(f);}

function announceSend(){
  const email=$('#ch-email')&&$('#ch-email').checked, sms=$('#ch-sms')&&$('#ch-sms').checked;
  if(!email&&!sms){alert(tr('df_need_channel'));return;}
  const cats=[]; ['members','pres','import'].forEach(c=>{const el=$('#aud-'+c);if(el&&el.checked)cats.push(c);});
  if(!cats.length){alert(tr('df_need_aud'));return;}
  const rec=state_contacts.filter(c=>ctTargetable(c)&&cats.includes(c.cat));
  const ev=diffEv(), ch=[email?tr('df_ch_email'):null,sms?tr('df_ch_sms'):null].filter(Boolean).join(' + ');
  state_outbox.unshift({id:uid('o'),kind:'announce',n:rec.length,ch,ev:ev?ev.title:'',ts:Date.now()});
  saveLocal(); alert(tr('df_sent_ok').replace('{n}',rec.length)); render();
}

  const tog=c.bereavement?'':`
    <button class="ct-tog ${c.announce?'on':''}" onclick="ctToggle('${c.id}','announce')">${tr('df_th_announce')}</button>
