function viewEvents(){
  const feePct=(UBORA_FEE_RATE*100).toFixed(1).replace('.0','');
  const f=state.evFilter;
  const scope=state.evScope||'mine';
  const inScope=ev=>scope==='discover' ? (ev.visibility==='public'&&ev.openToAll) : evVisibleToMe(ev);
  const base=state_events.filter(ev=>{ if(evIsPast(ev))return false; if(evHidden(ev)&&!canEditEvent(ev))return false; return inScope(ev); });
  const pastCount=state_events.filter(ev=>evIsPast(ev)&&inScope(ev)&&!(evHidden(ev)&&!canEditEvent(ev))).length;
  const continents=['AF','EU','AM','AS','OT'];
  const countriesScope=base.filter(e=>!f.cont||evCont(e)===f.cont);
  const countries=[...new Set(countriesScope.map(e=>e.country).filter(Boolean))];
  const citiesScope=countriesScope.filter(e=>!f.country||e.country===f.country);
  const cities=[...new Set(citiesScope.map(e=>e.city).filter(Boolean))];
  let list=base.slice();
  if(f.cont)list=list.filter(e=>evCont(e)===f.cont);
  if(f.country)list=list.filter(e=>e.country===f.country);
  if(f.city)list=list.filter(e=>e.city===f.city);
  if(f.cat)list=list.filter(e=>(e.category||'autre')===f.cat);
  if(f.q){const q=f.q.toLowerCase();list=list.filter(e=>((e.title+' '+e.group+' '+(e.city||'')+' '+(e.country||'')+' '+(e.desc||'')).toLowerCase().includes(q)));}
  const sortMode=state.evSort||(scope==='discover'?'near':'soon');
  const byDate=(a,b)=>String(a.dateISO||'9999-12-31').localeCompare(String(b.dateISO||'9999-12-31'));
  if(sortMode==='new'){ list.sort((a,b)=>String(b.postedISO||b.dateISO||'').localeCompare(String(a.postedISO||a.dateISO||''))||byDate(a,b)); }
  else if(sortMode==='near'){ const home=state.homeCountry||'', hc=COUNTRY_CONT[home]||''; const rk=e=>(e.country===home?0:(evCont(e)===hc?1:2)); list.sort((a,b)=>{const r=rk(a)-rk(b); return r||byDate(a,b);}); }
  else { list.sort(byDate); }
  const opt=(v,sel,lbl)=>`<option value="${v}" ${v===sel?'selected':''}>${lbl}</option>`;
  const contSel=`<select onchange="state.evFilter.cont=this.value;state.evFilter.country='';state.evFilter.city='';render()">`
    +opt('',f.cont,tr('evf_continent')+' — '+tr('evf_all'))
    +continents.map(c=>{const n=base.filter(e=>evCont(e)===c).length;return opt(c,f.cont,tr('cont_'+c)+(n?' ('+n+')':''));}).join('')+`</select>`;
  const countrySel=`<select onchange="state.evFilter.country=this.value;state.evFilter.city='';render()">`
    +opt('',f.country,tr('evf_country')+' — '+tr('evf_all'))
    +countries.map(c=>opt(c,f.country,c+' ('+countriesScope.filter(e=>e.country===c).length+')')).join('')+`</select>`;
  const citySel=`<select onchange="state.evFilter.city=this.value;render()">`
    +opt('',f.city,tr('evf_city')+' — '+tr('evf_all'))
    +cities.map(c=>opt(c,f.city,c+' ('+citiesScope.filter(e=>e.city===c).length+')')).join('')+`</select>`;
  const catPills=`<button class="catpill ${!f.cat?'on':''}" onclick="state.evFilter.cat='';render()">${tr('evf_cat_all')}</button>`
    +EVT_CATS.map(c=>`<button class="catpill ${f.cat===c?'on':''}" onclick="state.evFilter.cat='${c}';render()">${tr('cat_'+c)}</button>`).join('');
  const sortSel=`<select onchange="state.evSort=this.value;render()">`+opt('soon',sortMode,tr('evf_sort_soon'))+opt('new',sortMode,tr('evf_sort_new'))+opt('near',sortMode,tr('evf_sort_near'))+`</select>`;
  const anyFilter=f.cont||f.country||f.city||f.cat||f.q;
  const filterBar=`<div class="evfilter">
    <input class="evf-search" placeholder="${tr('evf_search_ph')}" value="${esc(f.q||'')}" onchange="state.evFilter.q=this.value;render()">
    <div class="evf-row">${contSel}${countrySel}${citySel}${sortSel}
      <button class="btn btn-ghost btn-sm" onclick="evNearMe()">${tr('evf_near')}</button>
      ${anyFilter?`<button class="btn btn-ghost btn-sm" onclick="state.evFilter={cont:'',country:'',city:'',cat:'',q:''};render()">${tr('evf_clear')}</button>`:''}
    </div>
    <div class="catpills">${catPills}</div>
  </div>`;
  const cards=list.map(ev=>{
    const manage=canEditEvent(ev), hidden=evHidden(ev);
    const {tickets,collected}=eventStats(ev);
    const pct=ev.objectif?Math.min(100,Math.round(collected/ev.objectif*100)):0;
    const flag=hidden?`<span class="pill p-late">${ev.removed?tr('mod_card_removed'):tr('mod_card_masked')}</span>`:'';
    const badges=`${evIsNew(ev)?`<span class="pill ev-new">${tr('ev_new_badge')}</span>`:''}<span class="pill cat-pill">${tr('cat_'+(ev.category||'autre'))}</span>${ev.openToAll?`<span class="pill open-pill">${tr('ev_open_all')}</span>`:''}${ev.visibility==='private'?`<span class="pill priv-pill">${tr('ev_private_badge')}</span>`:''}`;
    const loc=(ev.city||'')+(ev.country?((ev.city?', ':'')+ev.country):'');
    return `<div class="card caisse-card" style="border-left-color:${hidden?'var(--pending)':'var(--gold-bright)'};${hidden?'opacity:.7':''}">
      ${ev.visual?`<img class="ev-thumb" src="${ev.visual}" alt="">`:''}
      <div class="between"><div class="t-name">${esc(ev.title)}</div><span class="pill p-now">${ev.dateISO?evDateLabel(ev.dateISO):esc(ev.date)}</span></div>
      <div class="ev-badges">${badges}</div>
      <div class="t-meta">${esc(ev.group)}${ev.federation?` · <span class="rpn-tag">Réseau ${ev.federation}</span>`:''}${loc?` · ${esc(loc)}`:''}</div>
      <div class="between" style="margin-top:10px"><span class="mid" style="font-size:13px">${tickets} ${tr('ev_tickets')} · ${money(collected,ev.currency)} ${tr('ev_raised')}</span>${ev.objectif?`<span style="font-weight:600">${pct}%</span>`:''}</div>
      ${ev.objectif?`<div class="progress"><i style="width:${pct}%"></i></div>`:''}
      <div class="reg-cta"><span class="reg-count">${flag||(ev.openToAll?tr('ev_open_all'):tr('ev_ticketed'))}</span>
        <button class="btn btn-gold btn-sm" onclick="openEvent('${ev.id}')">${tr('ev_view_take')}</button></div>
    </div>`;
  }).join('');
  app().innerHTML=`
    <div class="eyebrow">${tr('ev_eyebrow')}</div>
    <h1 class="page-title">${tr('ev_title')}</h1>
    <p class="lead">${tr('ev_lead')}</p>
    <div>${trustSeal(tr('ev_seal'))}</div>
    <div class="row-gap" style="margin:6px 0 2px"><button class="btn btn-gold btn-sm" onclick="startEvent()">${tr('ev_create')}</button><button class="btn btn-ghost btn-sm" onclick="openDiffuse(null)">${tr('et_diffusion')}</button></div>
    <div class="ev-scope">
      <button class="ev-scope-btn ${scope==='mine'?'on':''}" onclick="setEvScope('mine')">${tr('ev_scope_mine')}</button>
      <button class="ev-scope-btn ${scope==='discover'?'on':''}" onclick="setEvScope('discover')">${tr('ev_scope_discover')}</button>
    </div>
    ${scope==='discover'?`<p class="msub ev-discover-hint">${tr('ev_discover_hint')}</p>`:''}
    ${filterBar}
    <div class="msub" style="margin:4px 0 10px">${tr('evf_results').replace('{n}',list.length)}${pastCount?` · <span class="faint">${tr('ev_past_archived').replace('{n}',pastCount)}</span>`:''}</div>
    <div class="cards">${cards||`<div class="empty">${anyFilter?tr('ev_none_filter'):(scope==='discover'?tr('ev_discover_empty'):tr('ev_empty'))}</div>`}</div>
    <p class="msub" style="margin-top:20px">${tr('ev_fee_list').replace('{p}',feePct)}</p>
    ${footer()}`;
}

function viewEvent(){
  const ev=state_events.find(x=>x.id===state.activeEvent);
  if(!ev){go('events');return;}
  const manage=canEditEvent(ev), hidden=evHidden(ev);

  /* public : événement masqué/retiré → écran de modération, pas de contenu */
  if(hidden&&!manage){
    app().innerHTML=`
      <button class="backlink" onclick="goBack()">‹ ${backLabel()}</button>
      <div class="panel" style="margin-top:18px"><div style="padding:28px 22px;text-align:center">
        <div style="font-size:30px">🛡️</div>
        <h2 style="font-family:'Cormorant Garamond',serif;font-size:24px;margin:10px 0 8px;color:var(--ink)">${tr('mod_hidden_public_t')}</h2>
        <p class="msub" style="max-width:420px;margin:0 auto">${tr('mod_hidden_public_d')}</p>
      </div></div>${footer()}`;
    return;
  }

  const {tickets,collected}=eventStats(ev), feePct=(UBORA_FEE_RATE*100).toFixed(1).replace('.0','');
  const pct=ev.objectif?Math.min(100,Math.round(collected/ev.objectif*100)):0;
  const rows=ev.billets.map((b,i)=>`<div class="evt-ticket">
      <div><div class="mname">${b.nom}</div><div class="msub">${money(b.prix,ev.currency)} <span class="faint">+ ${tr('ev_plusfees')} ${money(uboraFee(b.prix),ev.currency)}</span> · ${b.vendus} ${tr('ev_taken')}</div></div>
      <button class="btn btn-gold btn-sm" onclick="buyTicket('${ev.id}',${i})">${tr('ev_take')}</button>
    </div>`).join('');
  const eds=(ev.editors||[]).map(e=>e.nom).filter(Boolean);
  const whoEdit=tr('ev_whoedit_pref')+(ev.creator||tr('ev_creator'))+(eds.length?(' + '+eds.join(', ')):'');
  const editBtn=manage
    ? `<button class="btn btn-ghost btn-sm" onclick="editEvent('${ev.id}')">${icon('doc')}${tr('ev_modify')}</button>`
    : `<span class="msub">${tr('ev_reserved')}</span>`;

  /* gestionnaire : panneau de modération si signalements ou retrait */
  let modPanel='';
  if(manage&&(evReportCount(ev)>0||ev.removed)){
    const banner = ev.removed ? `<div class="reassure" style="background:#fdeaea;color:#8a2b2b">● ${tr('mod_removed_note')}</div>`
      : (evMasked(ev) ? `<div class="reassure" style="background:#fdeaea;color:#8a2b2b">● ${tr('mod_masked_note')}</div>` : '');
    modPanel=`<div class="panel" style="border-left:3px solid var(--pending)">
      <div class="panel-h"><h3>${tr('mod_panel_h')}</h3><span class="pill p-late">${tr('mod_reports_count').replace('{n}',evReportCount(ev))}</span></div>
      <div style="padding:14px 20px">
        ${banner}
        ${evReportCount(ev)?`<div class="msub" style="margin:6px 0 12px">${tr('mod_reasons_lbl')} ${reportReasonsSummary(ev)}</div>`:''}
        <div class="row-gap">
          <button class="btn btn-ghost btn-sm" onclick="modClearReports('${ev.id}')">${tr('mod_ignore')}</button>
          <button class="btn ${ev.removed?'btn-gold':'btn-ghost'} btn-sm" onclick="modToggleRemove('${ev.id}')">${ev.removed?tr('mod_restore'):tr('mod_remove')}</button>
        </div>
      </div></div>`;
  }

  /* public : contrôle de signalement (le gestionnaire ne se signale pas lui-même) */
  let reportCtl='';
  if(!manage){
    if(state.reportFor===ev.id){
      reportCtl=`<div class="panel"><div class="panel-h"><h3>${tr('mod_report_q')}</h3></div>
        <div style="padding:14px 20px">
          <div class="row-gap" style="flex-wrap:wrap">
            ${['spam','inappropriate','scam','other'].map(r=>`<button class="btn btn-ghost btn-sm" onclick="submitReport('${ev.id}','${r}')">${tr('reason_'+r)}</button>`).join('')}
          </div>
          <div style="margin-top:10px"><button class="btn btn-ghost btn-sm" onclick="cancelReport()">${tr('cancel')}</button></div>
          <div class="msub" style="margin-top:10px">${tr('mod_demo_note')}</div>
        </div></div>`;
    } else if(state.reportDone===ev.id){
      reportCtl=`<div class="reassure" style="margin-top:14px">● ${tr('mod_report_thanks')}</div>`;
    } else {
      reportCtl=`<div style="text-align:center;margin-top:16px"><button class="btn btn-ghost btn-sm" style="color:var(--mid)" onclick="openReport('${ev.id}')">${tr('mod_report_btn')}</button></div>`;
    }
  }

  app().innerHTML=`
    <button class="backlink" onclick="goBack()">‹ ${backLabel()}</button>
    <div class="eyebrow">${evtTypeLabel(ev.type)}</div>
    <h1 class="page-title">${ev.title}</h1>
    <p class="lead">${ev.group}${ev.federation?' · Réseau '+ev.federation:''} · ${ev.date} · ${ev.lieu}</p>
    ${ev.visual?`<img class="ev-visual" src="${ev.visual}" alt="">`:''}
    <div class="asnote">${ev.desc}</div>
    <div>${trustSeal(tr('ev_seal'))}</div>
    ${modPanel}
    ${ev.objectif?`<div class="panel"><div style="padding:16px 20px"><div class="between"><span class="mid" style="font-size:13px">${tickets} ${tr('ev_tickets')} · ${money(collected,ev.currency)} ${tr('ev_raised')}</span><span style="font-weight:600">${pct}% ${tr('ev_of')} ${money(ev.objectif,ev.currency)}</span></div><div class="progress"><i style="width:${pct}%"></i></div></div></div>`:''}
    <div class="panel"><div class="panel-h"><h3>${tr('ev_tickets_panel')}</h3><span class="pill p-soon">${tr('ev_mockup')}</span></div>
      <div style="padding:4px 16px 12px">${rows}</div></div>
    <div class="reg-cta"><span class="reg-count">🔒 ${whoEdit}</span>${editBtn}</div>
    ${manage?`<div style="text-align:center;margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="openDiffuse('${ev.id}')">${tr('ev_announce')}</button></div>`:''}
    <div class="ev-nudge click" onclick="go('apex')">${tr("ev_nudge")}</div>
    <p class="msub" style="margin-top:14px">${tr('ev_pay_note').replace('{p}',feePct)}</p>
    ${reportCtl}
    ${footer()}`;
}

        <div style="margin-top:10px"><button class="btn btn-gold btn-sm" onclick="authVerify()">${tr('au_validate')}</button></div>
      </div>
    </div></div>${footer()}`;
}
async function authEmail(){try{const{error}=await sb.auth.signInWithOtp({email:($('#au-email').value||'').trim(),options:{emailRedirectTo:window.location.href}});if(error)throw error;alert(tr('al_au_sent'));}catch(e){alert(e.message);}}
async function authPhone(){try{const{error}=await sb.auth.signInWithOtp({phone:($('#au-phone').value||'').trim()});if(error)throw error;$('#au-otp').style.display='block';}catch(e){alert(e.message);}}
async function authVerify(){try{const{data,error}=await sb.auth.verifyOtp({phone:($('#au-phone').value||'').trim(),token:($('#au-token').value||'').trim(),type:'sms'});if(error)throw error;state.user=data.user.id;await db.loadList();state.view='home';render();}catch(e){alert(e.message);}}

async function boot(){
  if(BACKEND!=='supabase'){loadLocal();render();return;}            /* mode démo : restaure les essais locaux */
  try{
    await initSB();
    sb.auth.onAuthStateChange((_e,s)=>{ if(s&&s.user)state.user=s.user.id; });
    const{data}=await sb.auth.getUser();
    if(!data.user){state.view='auth';render();return;}
    state.user=data.user.id;await db.loadList();state.view='home';render();
  }catch(e){ BACKEND='memory'; render(); }                    /* repli démo si l'init échoue */
}
boot();
</script>
</body>
